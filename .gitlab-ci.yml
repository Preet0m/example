#git
stages:
  - build
  - deploy

# 🔨 BUILD STAGE
build_app:
  stage: build
  image: node:18

  script:
    - npm install
    - npm run build

  artifacts:
    paths:
      - build/
    expire_in: 1 hour

  only:
    - master

# 🚀 DEPLOY STAGE
deploy_to_ec2:
  stage: deploy
  image: alpine:latest

  dependencies:
    - build_app

  before_script:
    - apk add --no-cache openssh-client rsync

    # Setup SSH
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa

    - ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

  script:
    # Clear old files
    - ssh $EC2_USER@$EC2_HOST "rm -rf $DEPLOY_PATH/*"

    # Copy build folder to EC2
    - rsync -avz build/ $EC2_USER@$EC2_HOST:$DEPLOY_PATH

    # Restart nginx
    - ssh $EC2_USER@$EC2_HOST "sudo systemctl restart nginx"

  only:
    - master
